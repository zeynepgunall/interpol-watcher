version: '3.8'

services:
  # Container C - RabbitMQ mesaj kuyruğu
  rabbitmq:
    image: rabbitmq:3-management
    container_name: interpol_rabbitmq
    ports:
      - "5672:5672"       # AMQP protokolü
      - "15672:15672"     # Yönetim paneli (http://localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interpol_network

  # Container A - Interpol veri çekici
  fetcher:
    build:
      context: ./fetcher
      dockerfile: Dockerfile
    container_name: interpol_fetcher
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - interpol_network

  # Container B - Web sunucu + Consumer
  webserver:
    build:
      context: ./webserver
      dockerfile: Dockerfile
    container_name: interpol_webserver
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    networks:
      - interpol_network

networks:
  interpol_network:
    driver: bridge

volumes:
  db_data:
